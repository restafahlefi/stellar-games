# Nixpacks Configuration for Railway
# This tells Railway how to build and deploy the project

[phases.setup]
nixPkgs = ["nodejs-18_x", "npm-9_x"]

[phases.install]
cmds = [
  "cd frontend && npm ci",
  "cd ../backend_node && npm ci"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "cd backend_node && npm start"
